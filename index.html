<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toni vs Elias - Summer Scoreboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(to bottom,#87CEEB,#FFD580);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(8px);
    border-radius:20px;
    padding:30px;
    max-width:700px;
    width:100%;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h1{
    color:#ff7b00;
    margin-bottom:20px;
}

.scoreboard{
    display:flex;
    justify-content:space-around;
    gap:20px;
    margin-bottom:25px;
}

.player{
    flex:1;
    background:#fff7e6;
    padding:20px;
    border-radius:15px;
}

.player h2{
    color:#ff7b00;
}

.score{
    font-size:60px;
    margin:15px 0;
    color:#0080ff;
}

button{
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

.win-btn{
    background:#00b894;
    color:white;
}

.reset-btn{
    background:#ff4757;
    color:white;
    margin-top:20px;
}

.stats{
    margin-top:25px;
    text-align:left;
}

.stats h3{
    margin-bottom:10px;
    color:#ff7b00;
}

.stats p{
    margin:6px 0;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🏖️ Toni vs Elias Summer Scoreboard ☀️</h1>

    <div class="scoreboard">

        <div class="player">
            <h2>Toni</h2>
            <div class="score" id="toniScore">0</div>
            <button class="win-btn" onclick="addWin('toni')">
                Toni Wins 🏆
            </button>
        </div>

        <div class="player">
            <h2>Elias</h2>
            <div class="score" id="eliasScore">0</div>
            <button class="win-btn" onclick="addWin('elias')">
                Elias Wins 🏆
            </button>
        </div>

    </div>

    <div class="stats">
        <h3>📊 Statistics</h3>

        <p>Total Wins Toni: <strong id="toniTotal">0</strong></p>
        <p>Total Wins Elias: <strong id="eliasTotal">0</strong></p>

        <br>

        <p>Best Win Streak Toni: <strong id="toniBest">0</strong></p>
        <p>Best Win Streak Elias: <strong id="eliasBest">0</strong></p>
    </div>

    <button class="reset-btn" onclick="resetCurrentScore()">
        Reset Current Score 🌴
    </button>
</div>

<script>

let data = JSON.parse(localStorage.getItem("summerScoreboard"));

if(!data){
    data = {
        current:{
            toni:0,
            elias:0
        },
        totalWins:{
            toni:0,
            elias:0
        },
        currentStreak:{
            toni:0,
            elias:0
        },
        bestStreak:{
            toni:0,
            elias:0
        },
        lastWinner:null
    };
}

function save(){
    localStorage.setItem(
        "summerScoreboard",
        JSON.stringify(data)
    );
}

function addWin(player){

    data.current[player]++;
    data.totalWins[player]++;

    if(data.lastWinner === player){
        data.currentStreak[player]++;
    }else{
        let other = player === "toni" ? "elias" : "toni";

        data.currentStreak[player] = 1;
        data.currentStreak[other] = 0;

        data.lastWinner = player;
    }

    if(data.currentStreak[player] > data.bestStreak[player]){
        data.bestStreak[player] = data.currentStreak[player];
    }

    save();
    updateScreen();
}

function resetCurrentScore(){
    data.current.toni = 0;
    data.current.elias = 0;

    save();
    updateScreen();
}

function updateScreen(){

    document.getElementById("toniScore").textContent =
        data.current.toni;

    document.getElementById("eliasScore").textContent =
        data.current.elias;

    document.getElementById("toniTotal").textContent =
        data.totalWins.toni;

    document.getElementById("eliasTotal").textContent =
        data.totalWins.elias;

    document.getElementById("toniBest").textContent =
        data.bestStreak.toni;

    document.getElementById("eliasBest").textContent =
        data.bestStreak.elias;
}

updateScreen();

</script>

</body>
</html>
